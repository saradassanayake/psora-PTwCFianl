<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Psora — Draw</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Instrument+Serif:ital@0;1&display=swap');

    :root {
      --bg: #FAF7F2;
      --text: #2C2826;
      --accent: #D4726A;
      --accent-soft: #E8A49E;
      --canvas-bg: #FFFFFF;
      --border: #E0D8CF;
      --muted: #9A918A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px 28px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #7EC47E;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .instruction {
      text-align: center;
      padding: 4px 0 14px;
      font-size: 14px;
      color: var(--muted);
      font-style: italic;
      font-weight: 300;
    }

    #canvas-wrap {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--canvas-bg);
      box-shadow: 0 2px 20px rgba(0,0,0,0.04);
    }

    footer {
      width: 100%;
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .coverage-display {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      color: var(--text);
    }

    .coverage-display .num {
      color: var(--accent);
      font-size: 28px;
    }

    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .btn-clear:active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">p<span>s</span>ora</div>
    <div class="status-pill">
      <div class="status-dot"></div>
      broadcasting
    </div>
  </header>

  <p class="instruction">draw where you feel it</p>
  <div id="canvas-wrap"></div>

  <footer>
    <div class="coverage-display"><span class="num" id="pct">0.0</span>% covered</div>
    <button class="btn-clear" id="clearBtn">Clear</button>
  </footer>

  <script type="module">
    /* ── FIREBASE ── */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtbPICrsVz5mBs7XIuGdGJ4WqELORQElk",
      authDomain: "psora-9110d.firebaseapp.com",
      databaseURL: "https://psora-9110d-default-rtdb.firebaseio.com",
      projectId: "psora-9110d",
      storageBucket: "psora-9110d.firebasestorage.app",
      messagingSenderId: "671697488457",
      appId: "1:671697488457:web:875c8978b37473782acd98",
      measurementId: "G-MYWGV7MS1S"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvasRef = ref(db, 'psora/canvas');

    function broadcast(data) {
      set(canvasRef, data);
    }

    /* ── CONFIG ── */
    const BROADCAST_INTERVAL = 200;
    const DRAW_RADIUS = 18;
    const DRAW_ALPHA = 90;

    /* ── p5.js SKETCH ── */
    let cnv, drawLayer, canvasW, canvasH;
    let lastBroadcast = 0;
    let totalPixels = 0;
    let drawnPixels = 0;

    const headOutline = [
      [0.50,0.06],[0.62,0.08],[0.73,0.14],[0.80,0.22],[0.84,0.32],
      [0.85,0.42],[0.84,0.50],[0.82,0.56],
      [0.84,0.52],[0.87,0.54],[0.88,0.58],[0.87,0.62],[0.84,0.64],[0.82,0.62],
      [0.80,0.68],[0.76,0.76],[0.70,0.82],[0.62,0.87],[0.56,0.90],
      [0.50,0.91],
      [0.44,0.90],[0.38,0.87],[0.30,0.82],[0.24,0.76],[0.20,0.68],
      [0.18,0.62],[0.16,0.64],[0.13,0.62],[0.12,0.58],[0.13,0.54],[0.16,0.52],
      [0.18,0.56],
      [0.16,0.50],[0.15,0.42],[0.16,0.32],[0.20,0.22],[0.27,0.14],[0.38,0.08],
      [0.50,0.06]
    ];

    window.setup = function() {
      const maxW = Math.min(window.innerWidth - 40, 600);
      const maxH = window.innerHeight - 200;
      canvasW = maxW;
      canvasH = Math.min(maxH, maxW * 1.1);

      cnv = createCanvas(canvasW, canvasH);
      cnv.parent('canvas-wrap');
      cnv.style('display', 'block');

      drawLayer = createGraphics(canvasW, canvasH);
      drawLayer.clear();

      totalPixels = canvasW * canvasH;
      background(255);
      drawHeadOutline();
    };

    function drawHeadOutline() {
      push(); noFill(); stroke(210,205,195); strokeWeight(1.5);
      beginShape();
      for (let pt of headOutline) curveVertex(pt[0]*canvasW, pt[1]*canvasH);
      endShape(CLOSE);
      pop();

      push(); noFill(); stroke(210,205,195); strokeWeight(1);
      ellipse(canvasW*0.39, canvasH*0.42, canvasW*0.07, canvasH*0.03);
      ellipse(canvasW*0.61, canvasH*0.42, canvasW*0.07, canvasH*0.03);
      line(canvasW*0.50, canvasH*0.48, canvasW*0.48, canvasH*0.56);
      line(canvasW*0.48, canvasH*0.56, canvasW*0.52, canvasH*0.56);
      arc(canvasW*0.50, canvasH*0.66, canvasW*0.10, canvasH*0.04, 0, PI);
      pop();
    }

    function drawStroke(x, y) {
      drawLayer.noStroke();
      drawLayer.fill(212, 114, 106, DRAW_ALPHA);
      drawLayer.ellipse(x, y, DRAW_RADIUS * 2);
    }

    window.draw = function() {
      background(255);
      drawHeadOutline();
      image(drawLayer, 0, 0);

      if (mouseIsPressed || touches.length > 0) {
        let px = mouseX, py = mouseY;
        if (touches.length > 0) { px = touches[0].x; py = touches[0].y; }
        if (px > 0 && px < canvasW && py > 0 && py < canvasH) {
          drawStroke(px, py);
          let ppx = pmouseX, ppy = pmouseY;
          let d = dist(ppx, ppy, px, py);
          if (d > 2) {
            let steps = Math.ceil(d / 4);
            for (let i = 1; i < steps; i++) {
              let t = i / steps;
              drawStroke(lerp(ppx, px, t), lerp(ppy, py, t));
            }
          }
        }
      }

      if (millis() - lastBroadcast > BROADCAST_INTERVAL) {
        lastBroadcast = millis();
        calcCoverage();
      }
    };

    function calcCoverage() {
      drawLayer.loadPixels();
      let count = 0;
      let px = drawLayer.pixels;
      for (let i = 3; i < px.length; i += 4) {
        if (px[i] > 10) count++;
      }
      drawnPixels = count;
      let pct = (drawnPixels / totalPixels) * 100;
      document.getElementById('pct').textContent = pct.toFixed(1);

      let stressLevel = Math.min(5, Math.max(1, Math.ceil(pct / 6)));
      if (pct < 0.5) stressLevel = 0;

      broadcast({
        percentage: pct,
        stressLevel: stressLevel,
        timestamp: Date.now(),
        thumbnail: cnv.canvas.toDataURL('image/jpeg', 0.3)
      });
    }

    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

    document.getElementById('clearBtn').addEventListener('click', () => {
      drawLayer.clear();
      drawnPixels = 0;
      document.getElementById('pct').textContent = '0.0';
      broadcast({ percentage: 0, stressLevel: 0, timestamp: Date.now(), thumbnail: null });
    });
  </script>
</body>
</html>
