<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Psora — Viewer</title>
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap');

    :root {
      --bg: #ffffff;
      --text: #2C2826;
      --accent: #D4726A;
      --accent-soft: #E8A49E;
      --canvas-bg: #FFFFFF;
      --border: #E0D8CF;
      --muted: #9A918A;
      --card-bg: #FFFFFF;
      --level-1: #FDE9E2;
      --level-2: #FBD6CA;
      --level-3: #F9BCA9;
      --level-4: #F58E6E;
      --level-5: #F05423;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Satoshi', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 32px 48px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo img { display: block; height: 34px; width: auto; }

    .ipad-link {
      font-family: 'Satoshi', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #F05423;
      text-decoration: underline;
    }

    .ipad-link:hover { opacity: 0.75; }

    .journal-link {
      font-family: 'Satoshi', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: underline;
    }

    .journal-link:hover { opacity: 0.75; }

    main {
      padding: 32px 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-content: start;
      gap: 28px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.03);
    }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 20px;
    }

    .coverage-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .coverage-number {
      font-family: 'Satoshi', sans-serif;
      font-size: 96px;
      line-height: 1;
      color: var(--text);
      text-align: center;
      margin: auto 0;
    }

    .coverage-number span { font-size: 48px; color: var(--muted); }

    .stress-card { display: flex; flex-direction: column; }

    .stress-number {
      font-family: 'Satoshi', sans-serif;
      font-size: 96px;
      line-height: 1;
      text-align: center;
      margin: auto 0;
      transition: color 0.4s ease;
      color: var(--muted);
    }

    .stress-label-text {
      font-size: 15px;
      text-align: center;
      color: var(--muted);
      font-weight: 300;
      min-height: 20px;
    }

    .stress-bar-track { display: flex; gap: 6px; margin-top: 20px; }

    .stress-bar-segment {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      transition: background 0.4s ease;
    }

    .task-card { grid-column: 1 / -1; }

    .task-card-header { margin-bottom: 20px; }

    .task-group {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 13px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-group:last-child { border-bottom: none; }

    .task-input {
      flex: 1;
      font-family: 'Satoshi', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      border: none;
      outline: none;
      background: transparent;
    }

    .task-input::placeholder { color: var(--border); font-style: italic; }

    .difficulty-input {
      width: 130px;
      font-family: 'Satoshi', sans-serif;
      font-size: 13px;
      color: var(--text);
      border: none;
      outline: none;
      background: transparent;
      text-align: right;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .difficulty-input::-webkit-outer-spin-button,
    .difficulty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .difficulty-input::placeholder { color: var(--border); font-style: italic; }

    .task-card-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #psoraSort {
      font-family: 'Satoshi', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 28px;
      background: #F05423;
      color: #fff;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    #psoraSort:hover { opacity: 0.85; }

    .waiting-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .waiting-overlay.hidden { opacity: 0; pointer-events: none; }

    .waiting-text {
      font-family: 'Satoshi', sans-serif;
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .waiting-sub {
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    .waiting-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><img src="Psoralogo.svg" alt="Psora logo"></div>
    <a class="journal-link" href="https://docs.google.com/presentation/d/1ueQsKjiWXnvwRlea_wgp7smhnLtZ9YoEnr9gjMyNCBo/edit?usp=sharing" target="_blank">View Design/Development Journal</a>
  </header>

  <main>
    <div class="card coverage-card">
      <div class="card-label">Coverage</div>
      <div class="coverage-number"><span id="pctNum">0</span><span>%</span></div>
    </div>

    <div class="card stress-card">
      <div class="card-label">Stress Level</div>
      <div class="stress-number" id="stressNum">—</div>
      <div class="stress-label-text" id="stressLabel"></div>
    </div>

    <div class="card task-card">
      <div class="task-card-header">
        <div class="card-label" id="taskPlannerLabel">Task Planner</div>
      </div>
      <div id="taskList">
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Input Difficulty 1-5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Input Difficulty 1-5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Input Difficulty 1-5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Input Difficulty 1-5" onchange="clampDifficulty(this)">
        </div>
        <div class="task-group">
          <input class="task-input" type="text" placeholder="Click to type a task">
          <input class="difficulty-input" type="number" min="1" max="5" placeholder="Input Difficulty 1-5" onchange="clampDifficulty(this)">
        </div>
      </div>
      <div class="task-card-footer">
        <a class="ipad-link" href="https://saradassanayake.github.io/psora-PTwCFinal/" target="_blank">Open Interactive Input in a New Tab</a>
        <button id="psoraSort" onclick="psoraSort()">Psora Sort</button>
      </div>
    </div>
  </main>

  <script>
    window.currentStressLevel = 0; //Default is 0 (since nothing is drawn yet)

    // Based on asking different llm models (claude, gemini, chatgpt) and referncing research on how stress should be managed:
    // 1 (little to no Stress)
    // 2 (some stress)
    //3 (mild/moderate stress)
    //4 (moderately high stress levels)
    //5 (very high stress levels)
    // The orders within the array act as a guideline for how tasks shoudl eb reordered/repositioned
    var sortOrders = {
      1: [5, 4, 3, 2, 1],
      2: [4, 5, 3, 1, 2],
      3: [3, 1, 4, 2, 5],
      4: [1, 2, 3, 4, 5],
      5: [1, 2, 3, 4, 5]
    };

    function psoraSort() {
      var order = sortOrders[window.currentStressLevel] || [1, 2, 3, 4, 5];

      // Read all 5 tasks into a plain array
      var taskInputs = document.querySelectorAll('.task-input');
      var diffInputs = document.querySelectorAll('.difficulty-input');
      var tasks = [];
      for (var i = 0; i < 5; i++) {
        tasks.push({
          text: taskInputs[i].value,
          diff: parseInt(diffInputs[i].value) || 0
        });
      }

      // Sorting:
      tasks.sort(function(a, b) {
        var posA = order.indexOf(a.diff);
        var posB = order.indexOf(b.diff);
        if (posA === -1) posA = 999;
        if (posB === -1) posB = 999;
        return posA - posB;
      });

      // Write sorted values back into the inputs
      for (var i = 0; i < 5; i++) {
        taskInputs[i].value = tasks[i].text;
        diffInputs[i].value = tasks[i].diff || '';
      }

      document.getElementById('taskPlannerLabel').textContent = 'Task Planner (Suggested Order)';
    }

    function clampDifficulty(input) {
      var v = parseInt(input.value);
      input.value = isNaN(v) ? '' : Math.min(5, Math.max(1, v));
    }
  </script>

  <script type="module" src="firebase-viewer.js"></script>
</body>
</html>
